<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Career Guidance</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
}

nav{
    background:#003366;
    padding:15px;
}

nav a{
    color:white;
    text-decoration:none;
    margin-right:20px;
    font-size:18px;
}

.container{
    width:60%;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

h1{
    text-align:center;
    color:#003366;
}

label{
    font-size:18px;
    font-weight:bold;
}

select{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:20px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}

.result{
    margin-top:30px;
    padding:20px;
    background:#e8f5e9;
    border-left:5px solid green;
    font-size:18px;
}

</style>

</head>

<body>

<nav>

<a href="/">Home</a>
<a href="/dashboard">Dashboard</a>
<a href="/career">Career Guidance</a>

</nav>

<div class="container">

<h1>Career Guidance</h1>

<form method="POST">

<label>Select Your Skill</label>

<select name="skill" required>

<option value="">-- Select Skill --</option>

<option>Python</option>
<option>Java</option>
<option>C++</option>
<option>Web Development</option>
<option>Data Science</option>
<option>Cyber Security</option>
<option>Cloud Computing</option>

</select>

<button type="submit">Get Career Suggestion</button>

</form>

{% if recommendation %}

<div class="result">

<h3>Recommended Career Paths</h3>

<p>{{ recommendation }}</p>

</div>

{% endif %}

</div>

</body>
</html>
