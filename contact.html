<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>

    <style>
        body{
            font-family: Arial;
            background: #f2f6ff;
            margin: 0;
        }

        nav{
            background: #003366;
            padding: 15px;
        }

        nav a{
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-size: 18px;
        }

        h1{
            text-align: center;
            color: #003366;
            margin-top: 20px;
        }

        .container{
            width: 40%;
            margin: auto;
            margin-top: 30px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        input, textarea{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button{
            width: 100%;
            padding: 10px;
            background: #003366;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: #0055aa;
        }

        .success{
            text-align: center;
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

<nav>
    <a href="/">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/contact">Contact</a>
</nav>

<h1>Contact Us</h1>

<div class="container">

    {% if message_sent %}
        <p class="success">✔ Your message has been sent successfully!</p>
    {% endif %}

    <form method="POST">

        <label>Name</label>
        <input type="text" name="name" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Subject</label>
        <input type="text" name="subject" required>

        <label>Message</label>
        <textarea name="message" rows="5" required></textarea>

        <button type="submit">Send Message</button>

    </form>

</div>

</body>
</html>
