<!DOCTYPE html>
<html>

<head>

<title>Generated Resume</title>

<style>

body{

background:#f5f5f5;
font-family:Arial;

}

.resume{

width:800px;
margin:auto;
background:white;
padding:40px;
margin-top:20px;
box-shadow:0px 0px 10px gray;

}

h1{

text-align:center;
color:darkblue;

}

h2{

border-bottom:2px solid black;

}

</style>

</head>

<body>

<div class="resume">

<h1>{{name}}</h1>

<p>
<b>Email :</b> {{email}}
<input type="text">
</p>

<p>
<b>Phone :</b> {{phone}}
<input type="textarea">
</p>

<p>
<b>Address :</b> {{address}}
<input type="text">
</p>

<h2>Career Objective</h2>
<input type="text">

<p>{{career}}</p>
<input type="text">

<h2>Education</h2>
<input type="text">

<p>{{education}}</p>
<input type="text">

<h2>Skills</h2>
<input type="text">

<p>{{skills}}</p>
<input type="text">

<h2>Projects</h2>
<input type="text">

<p>{{project}}</p>
<input type="text">

<h2>Experience</h2>
<input type="text">

<p>{{experience}}</p>
<input type="text">

<h2>Languages</h2>
<input type="text">

<p>{{languages}}</p>
<input type="text">

<h2>Hobbies</h2>
<input type="text">

<p>{{hobbies}}</p>
<input type="text">

</div>

</body>
</html>
