<!DOCTYPE html>
<html>
<head>
    <title>Companies & Placement Updates</title>

    <style>
        body{
            font-family: Arial;
            background: #f2f6ff;
            margin: 0;
        }

        nav{
            background: #003366;
            padding: 15px;
        }

        nav a{
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-size: 18px;
        }

        h1{
            text-align: center;
            color: #003366;
            margin-top: 20px;
        }

        .container{
            width: 85%;
            margin: auto;
            margin-top: 30px;
        }

        .card{
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 6px solid #003366;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        .company-name{
            font-size: 22px;
            font-weight: bold;
            color: #003366;
        }

        .tag{
            display: inline-block;
            background: #e6f0ff;
            padding: 5px 10px;
            margin: 5px 5px 0 0;
            border-radius: 5px;
            font-size: 14px;
        }

        .apply{
            margin-top: 10px;
            display: inline-block;
            padding: 8px 15px;
            background: green;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .apply:hover{
            background: darkgreen;
        }
    </style>
</head>

<body>

<nav>
    <a href="/">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/companies">Companies</a>
</nav>

<h1>Placement Companies & Updates</h1>

<div class="container">

    {% for c in companies %}

    <div class="card">

        <div class="company-name">{{ c.name }}</div>

        <div class="tag">Role: {{ c.role }}</div>
        <div class="tag">Package: {{ c.package }}</div>
        <div class="tag">Location: {{ c.location }}</div>
        <div class="tag">Last Date: {{ c.last_date }}</div>

        <br>

        <a href="#" class="apply">Apply Now</a>

    </div>

    {% endfor %}

</div>

</body>
</html>
