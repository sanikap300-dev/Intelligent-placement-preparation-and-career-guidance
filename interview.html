<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Interview Questions</title>

<style>

body{
    margin:0;
    padding:0;
    background:#f4f7fc;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    width:80%;
    margin:auto;
    margin-top:30px;
}

h1{
    text-align:center;
    color:#003366;
}

.card{
    background:white;
    margin:20px 0;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

.question{
    font-size:20px;
    font-weight:bold;
    color:#004080;
}

.answer{
    margin-top:10px;
    font-size:17px;
    color:#444;
}

button{
    margin-top:15px;
    padding:10px 18px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.nav{
    text-align:center;
    margin-top:20px;
}

.nav a{
    text-decoration:none;
    background:green;
    color:white;
    padding:12px 20px;
    border-radius:5px;
}

.nav a:hover{
    background:darkgreen;
}

</style>

</head>
<body>

<div class="container">

<h1>AI Interview Questions Practice</h1>

{% for q in questions %}

<div class="card">

<div class="question">
Q{{loop.index}}. {{q.question}}
</div>

<div class="answer" id="ans{{loop.index}}" style="display:none;">
<b>Answer:</b><br><br>
{{q.answer}}
</div>

<button onclick="showAnswer('ans{{loop.index}}')">
Show Answer
</button>

</div>

{% endfor %}

<div class="nav">
<a href="/dashboard">Back to Dashboard</a>
</div>

</div>

<script>

function showAnswer(id){

var x=document.getElementById(id);

if(x.style.display==="none"){
    x.style.display="block";
}
else{
    x.style.display="none";
}

}

</script>

</body>
</html>
